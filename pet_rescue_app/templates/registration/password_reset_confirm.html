{% extends 'base.html' %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<div class="auth-page centered">
    <div class="auth-card standalone">
        <div class="auth-card-icon"><i class="fas fa-lock-open"></i></div>
        <div class="auth-card-header">
            <h1>Set New Password</h1>
            <p>Choose a strong new password for your account.</p>
        </div>
        <form method="POST">
            {% csrf_token %}
            {% if form.errors %}
            <div class="form-error-banner"><i class="fas fa-exclamation-circle"></i> {{ form.errors }}</div>
            {% endif %}
            <div class="form-group">
                <label><i class="fas fa-lock"></i> New Password</label>
                <div class="password-input-wrapper">
                    <input type="password" name="new_password1" id="np1" placeholder="New password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('np1',this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Confirm New Password</label>
                <div class="password-input-wrapper">
                    <input type="password" name="new_password2" id="np2" placeholder="Confirm new password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('np2',this)"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full"><i class="fas fa-save"></i> Set New Password</button>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function togglePassword(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.querySelector('i').classList.toggle('fa-eye');
    btn.querySelector('i').classList.toggle('fa-eye-slash');
}
</script>
{% endblock %}
