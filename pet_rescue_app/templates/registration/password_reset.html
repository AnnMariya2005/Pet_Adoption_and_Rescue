{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="auth-page centered">
    <div class="auth-card standalone">
        <div class="auth-card-icon"><i class="fas fa-key"></i></div>
        <div class="auth-card-header">
            <h1>Forgot Password?</h1>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
        </div>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_email"><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" name="email" id="id_email" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>
        </form>
        <div class="auth-back-link">
            <a href="{% url 'login' %}"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
