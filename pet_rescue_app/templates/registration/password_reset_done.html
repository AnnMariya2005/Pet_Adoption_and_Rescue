{% extends 'base.html' %}
{% block title %}Email Sent{% endblock %}
{% block content %}
<div class="auth-page centered">
    <div class="auth-card standalone success-card-auth">
        <div class="auth-card-icon success"><i class="fas fa-envelope-open-text"></i></div>
        <h1>Check Your Email!</h1>
        <p>We've sent you a password reset link. Check your inbox (and spam folder) and follow the instructions.</p>
        <a href="{% url 'login' %}" class="btn btn-primary btn-full"><i class="fas fa-sign-in-alt"></i> Back to Login</a>
    </div>
</div>
{% endblock %}
