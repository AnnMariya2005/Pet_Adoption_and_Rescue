{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="auth-page centered">
    <div class="auth-card standalone success-card-auth">
        <div class="auth-card-icon success"><i class="fas fa-check-circle"></i></div>
        <h1>Password Updated!</h1>
        <p>Your password has been successfully reset. You can now log in with your new password.</p>
        <a href="{% url 'login' %}" class="btn btn-primary btn-full"><i class="fas fa-sign-in-alt"></i> Sign In</a>
    </div>
</div>
{% endblock %}
